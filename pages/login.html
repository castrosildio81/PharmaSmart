<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/png" href="../Imagens/pharmasmart_logo01.png">
<title>Login - Pharmasmart</title>

<style>







/* ===== PALETA ===== */
:root {
  --bg-main: #d0d1d0;
  --bg-card: #ffffff;
  --bg-hover: #00380c;
  --primary: #424b60;
  --text-main: #000000;
  --text-muted: #000000;
}

/* ===== RESET ===== */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Segoe UI', sans-serif;
}


body {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  background: var(--bg-main);
  color: var(--text-main);
}
/* CENTRALIZA O LOGIN */
.main {
  flex: 1;
  display: flex;
  justify-content: center;
  align-items: center;
}
/* ===== CARD LOGIN ===== */
.login-box {
  background: var(--bg-card);
  padding: 30px;
  border-radius: 12px;
  width: 320px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.4);
}

/* TITULO */
.login-box h2 {
  text-align: center;
  margin-bottom: 20px;
}

/* INPUT */
.input-group {
  margin-bottom: 15px;
}

.input-group input {
  width: 100%;
  padding: 10px;
  background: var(--bg-main);
  border: 1px solid var(--bg-hover);
  border-radius: 8px;
  color: var(--text-main);
  outline: none;
}

.input-group input:focus {
  border-color: var(--primary);
}

/* BOTAO */
button {
  width: 100%;
  padding: 10px;
  background: var(--primary);
  border: none;
  border-radius: 8px;
  color: white;
  cursor: pointer;
}

button:hover {
  background: var(--bg-hover);
}



.footer {
  text-align: center;
  padding: 15px;
  font-size: 12px;
  color: var(--text-muted);
  border-top: 1px solid var(--bg-hover);
}
.lk {
  display: block;
  margin-top: 15px;
  text-align: center;
  text-decoration: none;
  font-size: 13px;
  color: var(--text-muted);
}

.lk:hover {
  color: rgb(0, 0, 0);
}
img{
  position: relative;
  width: 160px;
}
.input-wrapper {
  position: relative;
}

.input-wrapper input {
  padding-right: 35px; /* espaço para o ícone */
}

.input-icon {
  position: absolute;
  right: 10px;
  top: 50%;
  transform: translateY(-50%);
  color: #555;
  pointer-events: none;
}
.input-wrapper input:focus + .input-icon {
  color: var(--primary);
}


</style>
</head>

<body>
  <div class="main">
    <div class="login-box">
      <img src="../Imagens/pharmasmart_logo02.png" alt="" srcset="">
      <form action="../funcoes/login.php" method="POST">
        <div class="input-group">
          <div class="input-wrapper">
            <input type="text" name="number" placeholder="Telefone / Email" required>

            <!-- SVG USER -->
            <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" 
              width="18" height="18" viewBox="0 0 24 24" 
              fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="8" r="4"></circle>
              <path d="M4 20c0-4 4-7 8-7s8 3 8 7"></path>
            </svg>
          </div>
        </div>

        <div class="input-group">
          <div class="input-wrapper">
            <input type="password" name="senha" placeholder="Senha" required>

            <!-- SVG LOCK -->
            <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" 
              width="18" height="18" viewBox="0 0 24 24" 
              fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="11" width="18" height="11" rx="2"></rect>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
            </svg>
          </div>
        </div>
        <button type="submit">Entrar</button>
        <!-- LINK CRIAR CONTA -->
        <a href="../pages/criar_conta.html" class="lk c">Criar conta</a>
      </form>
    </div>
  </div>


  <div class="footer">
    © 2026 Pharmasmart • Todos os direitos reservados • pharmasmartsuporte@gmail.com • v1.0
  </div>

</body>
</html>
